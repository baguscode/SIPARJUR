<!-- ADMIN PANEL (tersembunyi) -->
<div id="adminPanel" style="display: none;">
    <div class="admin-container">
        <div class="admin-header">
            <h1>⚙️ SIPARJUR - Panel Administrator</h1>
            <button class="btn-logout" onclick="hideAdminPanel()">← Kembali ke Beranda</button>
        </div>
        
        <div class="admin-tabs">
            <button class="tab-btn active-tab" onclick="switchTab('gejala')">📋 Data Gejala</button>
            <button class="tab-btn" onclick="switchTab('jurusan')">🎓 Data Jurusan</button>
            <button class="tab-btn" onclick="switchTab('rule')">🔗 Matriks Rule</button>
        </div>

        <!-- TAB GEJALA -->
        <div id="tab-gejala" class="tab-content active">
            <div class="form-card">
                <h3>Tambah Gejala Baru</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Kode Gejala</label>
                        <input type="text" id="g-kode" placeholder="Contoh: G01" class="admin-input">
                    </div>
                    <div class="form-group">
                        <label>Pertanyaan Indikator Minat</label>
                        <input type="text" id="g-teks" placeholder="Apakah Anda tertarik..." class="admin-input">
                    </div>
                    <button class="btn-primary" onclick="addGejala()">+ Tambah Gejala</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr><th style="width:100px">Kode</th><th>Pertanyaan</th><th style="width:100px">Aksi</th></tr>
                    </thead>
                    <tbody id="table-gejala">
                        <tr><td colspan="3" style="text-align:center;">⏳ Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- TAB JURUSAN -->
        <div id="tab-jurusan" class="tab-content">
            <div class="form-card">
                <h3>Tambah Jurusan Baru</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Kode Jurusan</label>
                        <input type="text" id="j-kode" placeholder="Contoh: J01" class="admin-input">
                    </div>
                    <div class="form-group">
                        <label>Nama Jurusan</label>
                        <input type="text" id="j-nama" placeholder="Teknik Informatika" class="admin-input">
                    </div>
                    <div class="form-group full-width">
                        <label>Deskripsi Jurusan</label>
                        <textarea id="j-desc" placeholder="Deskripsi lengkap tentang jurusan ini..." rows="2" class="admin-textarea"></textarea>
                    </div>
                    <button class="btn-primary" onclick="addJurusan()">+ Tambah Jurusan</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr><th style="width:100px">Kode</th><th style="width:200px">Nama Jurusan</th><th>Deskripsi</th><th style="width:100px">Aksi</th></tr>
                    </thead>
                    <tbody id="table-jurusan">
                        <tr><td colspan="4" style="text-align:center;">⏳ Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- TAB RULE -->
        <div id="tab-rule" class="tab-content">
            <div class="form-card">
                <h3>Hubungkan Gejala ke Jurusan</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Pilih Gejala</label>
                        <select id="rule-gejala" class="admin-select"></select>
                    </div>
                    <div class="form-group">
                        <label>Pilih Jurusan</label>
                        <select id="rule-jurusan" class="admin-select"></select>
                    </div>
                    <div class="form-group">
                        <label>Bobot Pengaruh</label>
                        <select id="rule-bobot" class="admin-select">
                            <option value="3">🔥 Bobot 3 (Pengaruh Utama)</option>
                            <option value="1">📌 Bobot 1 (Pendukung)</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="addRule()">+ Hubungkan</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr><th style="width:100px">Kode Gejala</th><th style="width:100px">Jurusan</th><th style="width:80px">Bobot</th><th style="width:80px">Aksi</th></tr>
                    </thead>
                    <tbody id="table-rule">
                        <tr><td colspan="4" style="text-align:center;">⏳ Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
